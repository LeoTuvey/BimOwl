<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

button{
  padding: 15px 20px;
  font-size: 18px;
  background: #58cc02;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover{
  opacity: 0.9;
}
</style>
</head>

<body>

<h1>🦉 Lesson Page</h1>

<p>Click below to finish lesson</p>

<button id="finishBtn">
  Finish Lesson (+10 XP)
</button>

<!-- ENGINE -->
<script src="engine-core.js"></script>

<script>
console.log("🧪 Lesson loaded");

// =========================
// SAFETY CHECK
// =========================
if (!window.Engine) {
  console.error("❌ Engine not loaded");
}

// =========================
// MAIN FUNCTION
// =========================
function runFinishLogic() {

  console.log("🔥 runFinishLogic triggered");

  const engine = window.Engine;

  // If Engine exists, award XP
  if (engine) {

    const oldLevel = typeof engine.getLevel === "function"
      ? engine.getLevel()
      : 1;

    const xpReward = 10;

    if (typeof engine.addXP === "function") {
      engine.addXP(xpReward);
    }

    if (typeof engine.updateStreak === "function") {
      engine.updateStreak();
    }

    if (typeof engine.resetHearts === "function") {
      engine.resetHearts();
    }

    const newLevel = typeof engine.getLevel === "function"
      ? engine.getLevel()
      : oldLevel;

    if (newLevel > oldLevel) {
      alert("🏆 LEVEL UP!");
    } else {
      alert("+10 XP!");
    }

  } else {
    // Fallback if engine is missing
    alert("Lesson Complete!");
  }

  // =========================
  // OPEN NEXT PAGE
  // =========================
  window.location.href = "game1.html";
}

// =========================
// BUTTON CLICK
// =========================
document.getElementById("finishBtn").addEventListener("click", runFinishLogic);

</script>

</body>
</html>
